<script>
(function(){var wrap=document.getElementById("mcq-anxiety-counselling");if(!wrap)return;var track=wrap.querySelector(".mcq-track"),dots=wrap.querySelectorAll(".mcq-dot"),prevBtn=wrap.querySelector(".mcq-prev"),nextBtn=wrap.querySelector(".mcq-next"),counter=wrap.querySelector(".mcq-current"),total=3,current=0,startX=0,deltaX=0,dragging=false;function goTo(i){current=Math.max(0,Math.min(i,total-1));track.style.transform="translateX(-"+(current*100)+"%)";dots.forEach(function(d,idx){d.classList.toggle("mcq-active",idx===current)});if(counter)counter.textContent=current+1;if(prevBtn)prevBtn.disabled=current===0;if(nextBtn)nextBtn.disabled=current===total-1}if(prevBtn)prevBtn.addEventListener("click",function(){goTo(current-1)});if(nextBtn)nextBtn.addEventListener("click",function(){goTo(current+1)});dots.forEach(function(d){d.addEventListener("click",function(){goTo(+this.dataset.index)})});var vp=wrap.querySelector(".mcq-viewport");vp.addEventListener("pointerdown",function(e){if(e.pointerType==="mouse"&&e.button!==0)return;dragging=true;startX=e.clientX;deltaX=0;track.style.transition="none";vp.setPointerCapture(e.pointerId)});vp.addEventListener("pointermove",function(e){if(!dragging)return;deltaX=e.clientX-startX;var pct=current*100-(deltaX/vp.offsetWidth)*100;track.style.transform="translateX(-"+pct+"%)"});vp.addEventListener("pointerup",function(e){if(!dragging)return;dragging=false;track.style.transition="";var threshold=vp.offsetWidth*0.2;if(deltaX>threshold)goTo(current-1);else if(deltaX<-threshold)goTo(current+1);else goTo(current)});wrap.setAttribute("tabindex","0");wrap.addEventListener("keydown",function(e){if(e.key==="ArrowLeft")goTo(current-1);else if(e.key==="ArrowRight")goTo(current+1)});goTo(0)})()
</script>
