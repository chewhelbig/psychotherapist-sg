<!DOCTYPE html>
<html lang="en">

      <rect x="211" y="320" width="14" height="10" fill="#F5EDE0" rx="1" stroke="#D4CFC6" stroke-width="0.5"/>

      <ellipse cx="414" cy="305" rx="4" ry="7" fill="#6B4427" transform="rotate(-15,414,305)">

      <ellipse cx="424" cy="313" rx="5" ry="3.5" fill="#C09070"/>
      <circle cx="428" cy="312" r="1.5" fill="#4A2E1A"/>
